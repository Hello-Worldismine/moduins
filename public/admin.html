<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지 | 모두의 보험금 찾기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }

    /* 로그인 화면 */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      text-align: center;
    }

    .login-box h1 {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .login-box p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-box input:focus {
      border-color: #1a5cff;
      box-shadow: 0 0 0 3px rgba(26,92,255,0.12);
    }

    /* 관리자 대시보드 */
    .dashboard { display: none; }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 800;
      color: #1a1a2e;
    }

    .topbar span {
      font-size: 13px;
      color: #6b7280;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 28px;
      flex: 1;
      min-width: 140px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .stat-card .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 800;
      color: #1a5cff;
    }

    .table-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .table-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .search-input {
      padding: 9px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: #1a5cff; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background: #f8fafc;
    }

    th {
      text-align: left;
      padding: 13px 20px;
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    td {
      padding: 14px 20px;
      border-top: 1px solid #f1f5f9;
      color: #374151;
      vertical-align: middle;
    }

    tr:hover td { background: #f8fafc; }

    .region-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .del-btn {
      background: none;
      border: 1px solid #fca5a5;
      color: #ef4444;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .del-btn:hover { background: #fef2f2; }

    .empty-row td {
      text-align: center;
      padding: 48px;
      color: #9ca3af;
      font-size: 15px;
    }

    .no-data-icon { font-size: 36px; margin-bottom: 8px; }

    /* 공통 버튼 */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary { background: #1a5cff; color: #fff; }
    .btn-primary:hover { background: #1346cc; }
    .btn-secondary { background: #f1f5f9; color: #374151; }
    .btn-secondary:hover { background: #e2e8f0; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 14px;
    }

    .date-text { color: #9ca3af; font-size: 13px; }

    @media (max-width: 600px) {
      .topbar { padding: 14px 16px; }
      .main { padding: 20px 12px; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- 로그인 화면 -->
  <div class="login-wrap" id="loginScreen">
    <div class="login-box">
      <h1>🔒 관리자 로그인</h1>
      <p>상담 신청 목록을 확인하려면<br>관리자 비밀번호를 입력하세요.</p>
      <div id="loginError" class="error-msg"></div>
      <input type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="current-password">
      <button class="btn btn-primary" style="width:100%; padding:14px;" onclick="doLogin()">로그인</button>
    </div>
  </div>

  <!-- 대시보드 -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <h1>모두의 보험금 찾기 · 관리자</h1>
      <div class="topbar-right">
        <span id="lastUpdated"></span>
        <button class="btn btn-secondary" onclick="loadData()">새로고침</button>
        <button class="btn btn-secondary" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="main">
      <div class="stats-row">
        <div class="stat-card">
          <div class="label">전체 신청 수</div>
          <div class="value" id="totalCount">-</div>
        </div>
        <div class="stat-card">
          <div class="label">오늘 신청 수</div>
          <div class="value" id="todayCount">-</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <h2>신청자 목록</h2>
          <input class="search-input" type="text" id="searchInput" placeholder="이름 또는 전화번호 검색" oninput="filterTable()">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>이름</th>
                <th>전화번호</th>
                <th>생년월일</th>
                <th>거주지역</th>
                <th>신청일시</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="7"><div class="loading">불러오는 중...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let adminPassword = '';
    let allData = [];

    document.getElementById('pwInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const pw = document.getElementById('pwInput').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';

      if (!pw) {
        errEl.textContent = '비밀번호를 입력해주세요.';
        errEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`/api/submissions?password=${encodeURIComponent(pw)}`);
        if (!res.ok) {
          const d = await res.json();
          errEl.textContent = d.error || '로그인에 실패했습니다.';
          errEl.style.display = 'block';
          return;
        }
        adminPassword = pw;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
      } catch {
        errEl.textContent = '서버 연결에 실패했습니다.';
        errEl.style.display = 'block';
      }
    }

    async function loadData() {
      try {
        const res = await fetch(`/api/submissions?password=${encodeURIComponent(adminPassword)}`);
        if (!res.ok) { logout(); return; }
        allData = await res.json();
        renderTable(allData);
        updateStats(allData);
        document.getElementById('lastUpdated').textContent =
          '최종 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
      } catch {
        document.getElementById('tableBody').innerHTML =
          '<tr class="empty-row"><td colspan="7">데이터를 불러오지 못했습니다.</td></tr>';
      }
    }

    function updateStats(data) {
      document.getElementById('totalCount').textContent = data.length;
      const today = new Date().toISOString().slice(0, 10);
      const todayItems = data.filter(d => d.createdAt.startsWith(today));
      document.getElementById('todayCount').textContent = todayItems.length;
    }

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allData.filter(d =>
        d.name.toLowerCase().includes(q) || d.phone.includes(q)
      );
      renderTable(filtered);
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="7">
          <div class="no-data-icon">📋</div>
          <div>신청 내역이 없습니다.</div>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = data.map((d, i) => `
        <tr>
          <td style="color:#9ca3af;font-size:13px">${data.length - i}</td>
          <td><strong>${esc(d.name)}</strong></td>
          <td>${esc(d.phone)}</td>
          <td>${formatBirth(d.birthdate)}</td>
          <td><span class="region-badge">${esc(d.region)}</span></td>
          <td class="date-text">${formatDate(d.createdAt)}</td>
          <td>
            <button class="del-btn" onclick="deleteItem(${d.id})">삭제</button>
          </td>
        </tr>
      `).join('');
    }

    async function deleteItem(id) {
      if (!confirm('이 신청 내역을 삭제하시겠습니까?')) return;
      try {
        const res = await fetch(`/api/submissions/${id}?password=${encodeURIComponent(adminPassword)}`, {
          method: 'DELETE'
        });
        if (res.ok) loadData();
      } catch {
        alert('삭제에 실패했습니다.');
      }
    }

    function logout() {
      adminPassword = '';
      allData = [];
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('pwInput').value = '';
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    function formatBirth(str) {
      if (!str) return '-';
      const [y, m, d] = str.split('-');
      return `${y}년 ${m}월 ${d}일`;
    }
  </script>
</body>
</html>
