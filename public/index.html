<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상담 신청 | 모두의 보험금 찾기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-area .badge {
      display: inline-block;
      background: #1a5cff;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.4;
    }

    .logo-area p {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 24px 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    label .required {
      color: #ef4444;
      margin-left: 2px;
    }

    input, select {
      width: 100%;
      min-width: 0;
      padding: 14px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      color: #1a1a2e;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
      outline: none;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
    }

    .birthdate-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .birthdate-row select {
      flex: 1;
      min-width: 0;
    }

    input:focus, select:focus {
      border-color: #1a5cff;
      box-shadow: 0 0 0 3px rgba(26,92,255,0.12);
    }

    input::placeholder {
      color: #9ca3af;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #1a5cff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .submit-btn:hover { background: #1346cc; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .notice {
      margin-top: 16px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.7;
    }

    /* 성공 화면 */
    .success-screen {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: #dbeafe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }

    .success-screen h2 {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .success-screen p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.7;
    }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) {
      .container { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 폼 화면 -->
    <div id="formScreen">
      <div class="logo-area">
        <span class="badge">무료 상담</span>
        <h1>모두의 보험금 찾기<br>상담 신청</h1>
        <p>아래 정보를 입력하시면<br>전문 상담사가 빠르게 연락드립니다.</p>
      </div>

      <hr class="divider">

      <div id="errorMsg" class="error-msg"></div>

      <form id="consultForm">
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="홍길동" maxlength="20">
        </div>

        <div class="form-group">
          <label>전화번호 <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="13">
        </div>

        <div class="form-group">
          <label>생년월일 <span class="required">*</span></label>
          <div class="birthdate-row">
            <select id="birthYear"><option value="">년도</option></select>
            <select id="birthMonth"><option value="">월</option></select>
            <select id="birthDay"><option value="">일</option></select>
          </div>
        </div>

        <div class="form-group">
          <label>거주지역 <span class="required">*</span></label>
          <select id="region">
            <option value="">지역을 선택해주세요</option>
            <option value="서울">서울</option>
            <option value="경기">경기</option>
            <option value="인천">인천</option>
            <option value="부산">부산</option>
            <option value="대구">대구</option>
            <option value="광주">광주</option>
            <option value="대전">대전</option>
            <option value="울산">울산</option>
            <option value="세종">세종</option>
            <option value="강원">강원</option>
            <option value="충북">충북</option>
            <option value="충남">충남</option>
            <option value="전북">전북</option>
            <option value="전남">전남</option>
            <option value="경북">경북</option>
            <option value="경남">경남</option>
            <option value="제주">제주</option>
          </select>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">신청하기</button>
      </form>

      <p class="notice">
        입력하신 개인정보는 상담 목적으로만 사용되며<br>
        안전하게 보호됩니다.
      </p>
    </div>

    <!-- 성공 화면 -->
    <div id="successScreen" class="success-screen">
      <div class="success-icon">✅</div>
      <h2>신청이 완료되었습니다!</h2>
      <p>
        입력하신 연락처로<br>
        빠른 시일 내에 전문 상담사가<br>
        연락드릴 예정입니다.<br><br>
        감사합니다.
      </p>
    </div>
  </div>

  <script>
    // 전화번호 자동 하이픈
    document.getElementById('phone').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '');
      if (v.length <= 3) {
        this.value = v;
      } else if (v.length <= 7) {
        this.value = v.slice(0, 3) + '-' + v.slice(3);
      } else {
        this.value = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
      }
    });

    // 생년월일 드롭다운 채우기
    (function () {
      const now = new Date();
      const yearSel = document.getElementById('birthYear');
      const monthSel = document.getElementById('birthMonth');
      const daySel = document.getElementById('birthDay');

      for (let y = now.getFullYear(); y >= 1930; y--) {
        yearSel.innerHTML += `<option value="${y}">${y}년</option>`;
      }
      for (let m = 1; m <= 12; m++) {
        monthSel.innerHTML += `<option value="${String(m).padStart(2,'0')}">${m}월</option>`;
      }
      for (let d = 1; d <= 31; d++) {
        daySel.innerHTML += `<option value="${String(d).padStart(2,'0')}">${d}일</option>`;
      }
    })();

    document.getElementById('consultForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const y = document.getElementById('birthYear').value;
      const m = document.getElementById('birthMonth').value;
      const d = document.getElementById('birthDay').value;
      const birthdate = (y && m && d) ? `${y}-${m}-${d}` : '';
      const region = document.getElementById('region').value;

      if (!name) return showError('이름을 입력해주세요.');
      if (!phone) return showError('전화번호를 입력해주세요.');
      if (!birthdate) return showError('생년월일을 선택해주세요.');
      if (!region) return showError('거주지역을 선택해주세요.');

      btn.disabled = true;
      btn.textContent = '신청 중...';

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, birthdate, region })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || '오류가 발생했습니다.');
          btn.disabled = false;
          btn.textContent = '신청하기';
          return;
        }

        document.getElementById('formScreen').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
      } catch {
        showError('서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
        btn.disabled = false;
        btn.textContent = '신청하기';
      }
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
